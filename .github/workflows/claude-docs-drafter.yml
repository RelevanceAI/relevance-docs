name: Claude Docs Drafter

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'What Claude Code should do in the relevance-docs repo'
        required: true
        type: string
      linear_issue_key:
        description: 'Linear issue key (e.g. TSP-123) — used for default branch naming'
        required: true
        type: string
      branch_name:
        description: 'Optional: existing branch to work on (overrides default docs/{key} naming)'
        required: false
        type: string

jobs:
  draft-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "Claude Docs Drafter"
          git config --global user.email "claude-docs-drafter[bot]@users.noreply.github.com"

      - name: Set up branch
        run: |
          # Use provided branch name, or default to docs/{linear_issue_key}
          if [ -n "${{ inputs.branch_name }}" ]; then
            BRANCH_NAME="${{ inputs.branch_name }}"
          else
            BRANCH_NAME="docs/${{ inputs.linear_issue_key }}"
          fi

          # Try to check out existing remote branch, or create new one
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            git checkout -b "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
          fi

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are working on the Relevance AI docs site (relevance-docs repo).

            ## Task
            ${{ inputs.task_description }}

            ## Context
            - Linear issue: ${{ inputs.linear_issue_key }}
            - Branch: ${{ env.BRANCH_NAME }}

            ## Instructions
            1. Read the CLAUDE.md file for documentation standards
            2. Do whatever the task asks — edit files, rebase, create PRs, fix conflicts, etc.
            3. If creating or updating docs, explore similar pages first for reference
            4. Commit with a clear message referencing ${{ inputs.linear_issue_key }}
            5. Push your changes
            6. If no PR exists for this branch yet, create one targeting main with:
               - Title: "docs(${{ inputs.linear_issue_key }}): <brief description>"
               - Body: Summary of changes, link to https://linear.app/relevance/issue/${{ inputs.linear_issue_key }}/
               - Label: "docs-drafter" (create with `gh label create docs-drafter` if it doesn't exist)
            7. If a PR already exists, just push — don't create a duplicate
          claude_args: '--allowedTools "Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git checkout:*),Bash(git rebase:*),Bash(git fetch:*),Bash(git merge:*),Bash(git pull:*),Bash(npx mintlify dev:*),Bash(gh pr:*),Bash(gh label:*),Read,Write,Edit,Glob,Grep"'

      - name: Extract PR URL
        id: extract-pr
        if: success()
        run: |
          PR_URL=$(gh pr list --head "$BRANCH_NAME" --json url --jq '.[0].url' 2>/dev/null || echo "")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
